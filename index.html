<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do-spillet i Dassavisa</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

#game {
    position: relative;
    width: 100%;
    height: 500px;
    background: url("stbl.png") no-repeat center;
    overflow: hidden;
    border-bottom: 4px solid black;
    margin-top: 40px; /* Flytter spillet ned */
}

#player {
    position: absolute;
    bottom: 0;
    left: 40px;
    width: 70px;
    height: 70px;
    background: url("hode.png") no-repeat center;
    background-size: contain;
}

.obstacle {
    position: absolute;
    bottom: 0;
    width: 70px;
    height: 90px; /* standard lavere høyde */
    background: url("Urbygg.png") no-repeat center;
    background-size: contain;
}

button {
    padding: 8px 15px;
    margin: 5px;
}

input {
    padding: 6px;
}

#leaderboard {
    margin-top: 15px;
}

.character-select img {
    border: 2px solid transparent;
    cursor: pointer;
    margin: 3px;
    border-radius: 5px;
    width: 50px;
}

.character-select img.selected {
    border-color: #007BFF;
}
</style>
</head>

<body>

<h2>Do-spillet i Dassavisa🏃‍♀️</h2>

<div id="startScreen">
    <input type="text" id="username" placeholder="Skriv navnet ditt">
    
    <h4>Velg karakter:</h4>
    <div class="character-select">
        <img src="hode.png" data-img="hode.png" class="char-img selected">
        <img src="hode2.png" data-img="hode2.png" class="char-img">
        <img src="hode3.png" data-img="hode3.png" class="char-img">
    </div>
    
    <br>
    <button id="startBtn">Start</button>
</div>

<h3>Score: <span id="score">0</span></h3>

<div id="game">
    <div id="player"></div>
</div>

<div id="gameOverScreen" style="display:none;">
    <h3>Du tapte:( Nå skal du få tisse og bæsje i fred<3</h3>
    <button onclick="restartGame()">Try Again</button>
</div>

<div id="leaderboard"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9ayYOV5UwhU2ZnDVI9Tt_FyjyCor7mZELD1aWr9Pj2s99In9VrDyUKlbs4IpeRowanA/exec";

let player = document.getElementById("player");
let scoreDisplay = document.getElementById("score");

let isJumping = false;
let velocity = 0;
let gravity = 0.6;
let score = 0;
let speed = 6;
let username = "";

let gameInterval;
let obstacleInterval;

// Karaktervalg
let selectedCharacter = "hode.png";

document.querySelectorAll('.char-img').forEach(img => {
    const selectChar = () => {
        document.querySelectorAll('.char-img').forEach(i => i.classList.remove('selected'));
        img.classList.add('selected');
        selectedCharacter = img.dataset.img;
    };
    img.addEventListener('click', selectChar);
    img.addEventListener('touchstart', e => {
        e.preventDefault();
        selectChar();
    });
});

// Start-knapp
document.getElementById('startBtn').addEventListener('click', () => {
    username = document.getElementById('username').value;
    if (!username) {
        alert("Du må skrive navn!");
        return;
    }

    player.style.backgroundImage = `url(${selectedCharacter})`;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameOverScreen").style.display = "none";

    score = 0;
    speed = 6;
    scoreDisplay.innerText = score;
    player.style.bottom = "0px";

    clearObstacles();

    gameInterval = setInterval(updateGame, 20);
    obstacleInterval = setInterval(createObstacle, 2000);
});

function restartGame() {
    // Beholder samme karakter
    document.getElementById("startScreen").style.display = "block";
    document.getElementById("gameOverScreen").style.display = "none";
}

function jump() {
    if (!isJumping) {
        isJumping = true;
        velocity = 22;
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

function updateGame() {
    velocity -= gravity;
    let bottom = parseFloat(player.style.bottom) || 0;
    bottom += velocity;

    if (bottom <= 0) {
        bottom = 0;
        isJumping = false;
    }

    player.style.bottom = bottom + "px";

    score++;
    scoreDisplay.innerText = score;

    if (score % 200 === 0) {
        speed += 0.5;
    }

    checkCollision();
}

function createObstacle() {
    let obstacle = document.createElement("div");
    obstacle.classList.add("obstacle");

    let obstacleHeight = Math.floor(Math.random() * 50) + 70;
    obstacle.style.height = obstacleHeight + "px";

    obstacle.style.left = window.innerWidth + "px";
    document.getElementById("game").appendChild(obstacle);

    let move = setInterval(() => {
        let left = parseFloat(obstacle.style.left);
        left -= speed;
        obstacle.style.left = left + "px";

        if (left < -100) {
            obstacle.remove();
            clearInterval(move);
        }
    }, 20);
}

function checkCollision() {
    let playerRect = player.getBoundingClientRect();
    let obstacles = document.querySelectorAll(".obstacle");

    obstacles.forEach(obstacle => {
        let rect = obstacle.getBoundingClientRect();

        if (
            playerRect.left < rect.right &&
            playerRect.right > rect.left &&
            playerRect.bottom > rect.top
        ) {
            gameOver();
        }
    });
}

async function gameOver() {
    clearInterval(gameInterval);
    clearInterval(obstacleInterval);

    document.getElementById("gameOverScreen").style.display = "block";

    await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ name: username, score: score })
    });

    loadLeaderboard();
}

function clearObstacles() {
    document.querySelectorAll(".obstacle").forEach(o => o.remove());
}

async function loadLeaderboard() {
    const leaderboard = document.getElementById("leaderboard");

    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        leaderboard.innerHTML = "<h3>Topplista 🏆</h3>";

        data.forEach((entry, index) => {
            leaderboard.innerHTML +=
                (index + 1) + ". " + entry[0] +
                " - " + entry[1] + "<br>";
        });
    } catch (err) {
        leaderboard.innerHTML = "Kunne ikke laste toppliste ennå.";
    }
}

loadLeaderboard();

</script>

</body>
</html>
